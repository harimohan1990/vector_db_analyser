name: Deploy to AWS EC2

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Create app directory if not exists
            mkdir -p ~/vdb-app && cd ~/vdb-app

            # Write .env file from secrets
            cat > .env << 'ENVEOF'
            PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ENVEOF

            # Copy prod compose file
            cat > docker-compose.prod.yml << 'COMPOSEEOF'
            services:
              backend:
                image: ghcr.io/harimohan1990/vector_db_analyser/backend:latest
                container_name: vdb-backend
                ports:
                  - "8000:8000"
                env_file: .env
                volumes:
                  - ./data:/app/data
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                  start_period: 10s

              frontend:
                image: ghcr.io/harimohan1990/vector_db_analyser/frontend:latest
                container_name: vdb-frontend
                ports:
                  - "3000:80"
                depends_on:
                  backend:
                    condition: service_healthy
                restart: unless-stopped
            COMPOSEEOF

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Restart with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "✅ Deployed successfully"
